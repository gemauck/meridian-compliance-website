name: Setup mail account

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect hosting and mail accounts
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          NEW_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          set -euo pipefail
          echo "FTP_SERVER=$FTP_SERVER"
          echo "FTP_USERNAME=$FTP_USERNAME"

          CPANEL="https://${FTP_SERVER}:2083"
          echo "=== Existing mailboxes ==="
          curl -sS -m 20 -k -u "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "${CPANEL}/execute/Email/list_pops" \
            | jq '{status, errors, data: (.data // [] | map(.email))}'

          echo "=== Reset password for info@meridianconsulting.co.za ==="
          curl -sS -m 20 -k -u "${FTP_USERNAME}:${FTP_PASSWORD}" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"info\",\"password\":\"${NEW_PASSWORD}\",\"domain\":\"meridianconsulting.co.za\"}" \
            "${CPANEL}/execute/Email/passwd_pop" | jq '{status, errors, messages}'

          echo "=== IMAP auth test ==="
          python3 - <<'PY'
          import os, imaplib, ssl
          user = "info@meridianconsulting.co.za"
          password = os.environ["NEW_PASSWORD"]
          for h in ["mail.meridianconsulting.co.za", os.environ["FTP_SERVER"], "cp75.domains.co.za"]:
              try:
                  M = imaplib.IMAP4_SSL(h, 993, ssl_context=ssl.create_default_context())
                  M.login(user, password)
                  print(f"IMAP OK on {h}")
                  M.logout()
              except Exception as e:
                  print(f"IMAP FAIL on {h}: {e}")
          PY

          echo "=== Webmail reachability ==="
          for url in "https://webmail.domains.co.za" "https://webmail.meridianconsulting.co.za" "https://${FTP_SERVER}:2096"; do
            code=$(curl -sS -m 15 -k -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "$url -> HTTP $code"
          done
