name: Setup mail account

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect hosting and mail accounts
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          NEW_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          set -euo pipefail
          echo "FTP_SERVER=$FTP_SERVER"
          echo "FTP_USERNAME=$FTP_USERNAME"

          CPANEL="https://${FTP_SERVER}:2083"
          echo "=== Forward info@ to Gmail ==="
          FWD_BODY="$(mktemp)"
          FWD_CODE="$(curl -sS -m 20 -k -o "$FWD_BODY" -w "%{http_code}" -u "${FTP_USERNAME}:${FTP_PASSWORD}" \
            -G "${CPANEL}/execute/Email/add_forwarder" \
            --data-urlencode "domain=meridianconsulting.co.za" \
            --data-urlencode "email=info" \
            --data-urlencode "fwdopt=fwd" \
            --data-urlencode "fwdemail=gemauck@gmail.com")"
          echo "add_forwarder HTTP $FWD_CODE"
          jq '{status, errors, messages}' "$FWD_BODY" 2>/dev/null || head -c 400 "$FWD_BODY"

          echo "=== List forwarders ==="
          curl -sS -m 20 -k -u "${FTP_USERNAME}:${FTP_PASSWORD}" \
            -G "${CPANEL}/execute/Email/list_forwarders" \
            --data-urlencode "domain=meridianconsulting.co.za" \
            | jq '{status, errors, data: (.data // [] | map({dest, forward}))}' 2>/dev/null || true

          echo "=== Webmail reachability ==="
          for url in "https://webmail.domains.co.za" "https://webmail.meridianconsulting.co.za" "https://${FTP_SERVER}:2096"; do
            code=$(curl -sS -m 15 -k -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "$url -> HTTP $code"
          done
