name: Setup mail account

on:
  workflow_dispatch:
    inputs:
      new_password:
        description: New mailbox password (leave blank to use stored secret)
        required: false
        type: string
  push:
    branches: [main]
    paths: ['.github/workflows/setup-mail.yml']

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect hosting and mail accounts
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          INPUT_PASSWORD: ${{ inputs.new_password }}
          SECRET_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          set -euo pipefail
          NEW_PASSWORD="${INPUT_PASSWORD:-$SECRET_PASSWORD}"
          echo "FTP_SERVER=$FTP_SERVER"
          echo "FTP_USERNAME=$FTP_USERNAME"

          CPANEL="https://${FTP_SERVER}:2083"
          echo "=== cPanel version check ==="
          curl -sS -m 20 -k -u "${FTP_USERNAME}:${FTP_PASSWORD}" \
            "${CPANEL}/execute/Email/list_pops" | jq . || true

          echo "=== Try alternate cPanel user formats ==="
          for user in "$FTP_USERNAME" "${FTP_USERNAME%%@*}"; do
            echo "-- user: $user"
            curl -sS -m 20 -k -u "${user}:${FTP_PASSWORD}" \
              "${CPANEL}/execute/Email/list_pops" | jq '{status, errors, data: (.data // [] | map(.email))}' 2>/dev/null || echo "failed"
          done

          if [ -n "${NEW_PASSWORD:-}" ]; then
            echo "=== Reset password for info@meridianconsulting.co.za ==="
            curl -sS -m 20 -k -u "${FTP_USERNAME}:${FTP_PASSWORD}" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"info\",\"password\":\"${NEW_PASSWORD}\",\"domain\":\"meridianconsulting.co.za\"}" \
              "${CPANEL}/execute/Email/passwd_pop" | jq '{status, errors, messages}' || true
          fi

          echo "=== Webmail reachability ==="
          for url in "https://webmail.domains.co.za" "https://webmail.meridianconsulting.co.za" "https://${FTP_SERVER}:2096"; do
            code=$(curl -sS -m 15 -k -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "$url -> HTTP $code"
          done

          if [ -n "${NEW_PASSWORD:-}" ]; then
            echo "=== IMAP auth test ==="
            python3 - <<'PY'
import os, imaplib, ssl
host = "mail.meridianconsulting.co.za"
user = "info@meridianconsulting.co.za"
password = os.environ.get("NEW_PASSWORD", "")
for h in [host, os.environ.get("FTP_SERVER", ""), "cp75.domains.co.za"]:
    if not h:
        continue
    try:
        M = imaplib.IMAP4_SSL(h, 993, ssl_context=ssl.create_default_context())
        M.login(user, password)
        print(f"IMAP OK on {h}")
        M.logout()
    except Exception as e:
        print(f"IMAP FAIL on {h}: {e}")
PY
          fi
