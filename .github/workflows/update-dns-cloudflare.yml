name: Update DNS to Cloudflare Pages

on:
  workflow_dispatch:

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Point www CNAME to Cloudflare Pages
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          TARGET: meridian-compliance-website.pages.dev
          ZONE: meridianconsulting.co.za
        run: |
          set -euo pipefail
          CPANEL="https://${FTP_SERVER}:2083"
          AUTH=(-u "${FTP_USERNAME}:${FTP_PASSWORD}")

          uapi() {
            local module="$1"
            local func="$2"
            shift 2
            local body
            body="$(mktemp)"
            local code
            code="$(curl -sS -m 30 -k "${AUTH[@]}" \
              -H "Accept: application/json" \
              -G "${CPANEL}/execute/${module}/${func}" \
              "$@" \
              -o "$body" -w "%{http_code}")"
            echo "${module}.${func} HTTP ${code}"
            if ! jq -e . "$body" >/dev/null 2>&1; then
              echo "Non-JSON response:"
              head -c 500 "$body"
              exit 1
            fi
            jq '{status, errors, messages, data: (.result.data // .data // null)}' "$body" | head -c 4000
            cp "$body" /tmp/uapi_last.json
          }

          echo "=== Fetch zone via UAPI ==="
          uapi DNS fetch_zone --data-urlencode "zone=${ZONE}"

          LINE_INDEX="$(jq -r '
            [.result.data.zone[]?
              | select((.record_type // .type // "") == "CNAME")
              | select((.dname // .name // "") | test("^www(\\.meridianconsulting\\.co\\.za)?\\.?$"))
              | (.line_index // .line // empty)
            ][0] // empty
          ' /tmp/uapi_last.json)"

          if [ -z "$LINE_INDEX" ] || [ "$LINE_INDEX" = "null" ]; then
            echo "UAPI fetch_zone missing line_index; trying ZoneEdit API2"
            BODY="$(mktemp)"
            CODE="$(curl -sS -m 30 -k "${AUTH[@]}" \
              -H "Accept: application/json" \
              -G "${CPANEL}/json-api/cpanel" \
              --data-urlencode "cpanel_jsonapi_apiversion=2" \
              --data-urlencode "cpanel_jsonapi_module=ZoneEdit" \
              --data-urlencode "cpanel_jsonapi_func=fetchzone_records" \
              --data-urlencode "domain=${ZONE}" \
              -o "$BODY" -w "%{http_code}")"
            echo "ZoneEdit.fetchzone_records HTTP ${CODE}"
            jq '{error: .cpanelresult.error, data: (.cpanelresult.data // [])}' "$BODY" | head -c 4000
            LINE="$(jq -r '
              [.cpanelresult.data[]?
                | select(.type == "CNAME")
                | select(.name == ("www." + $zone) or .name == "www" or (.name | test("^www\\.")))
                | .line
              ][0] // empty
            ' --arg zone "${ZONE}." "$BODY")"
            if [ -z "$LINE" ] || [ "$LINE" = "null" ]; then
              echo "Could not find www CNAME"
              exit 1
            fi
            echo "Updating line ${LINE} via ZoneEdit"
            EDIT_BODY="$(mktemp)"
            CODE="$(curl -sS -m 30 -k "${AUTH[@]}" \
              -H "Accept: application/json" \
              -G "${CPANEL}/json-api/cpanel" \
              --data-urlencode "cpanel_jsonapi_apiversion=2" \
              --data-urlencode "cpanel_jsonapi_module=ZoneEdit" \
              --data-urlencode "cpanel_jsonapi_func=edit_zone_record" \
              --data-urlencode "domain=${ZONE}" \
              --data-urlencode "line=${LINE}" \
              --data-urlencode "type=CNAME" \
              --data-urlencode "address=${TARGET}." \
              -o "$EDIT_BODY" -w "%{http_code}")"
            echo "ZoneEdit.edit_zone_record HTTP ${CODE}"
            jq '.' "$EDIT_BODY"
            RESULT="$(jq -r '.cpanelresult.event.result // .cpanelresult.data[0].result // empty' "$EDIT_BODY")"
            if [ "$RESULT" != "1" ]; then exit 1; fi
          else
            echo "Updating line_index ${LINE_INDEX} via mass_edit_zone"
            EDIT_JSON="$(jq -nc --argjson li "$LINE_INDEX" --arg t "$TARGET" \
              '[{line_index: $li, dname: "www", ttl: 14400, record_type: "CNAME", data: [$t]}]')"
            uapi DNS mass_edit_zone \
              --data-urlencode "zone=${ZONE}" \
              --data-urlencode "edit=${EDIT_JSON}"
            STATUS="$(jq -r '.status // .result.status // 0' /tmp/uapi_last.json)"
            if [ "$STATUS" != "1" ]; then exit 1; fi
          fi

          echo "=== Verify DNS and site ==="
          for i in 1 2 3 4 5 6; do
            CNAME="$(dig +short "www.${ZONE}" CNAME | tr -d '\n')"
            echo "Attempt ${i}: www CNAME = ${CNAME:-<empty>}"
            if echo "$CNAME" | grep -qi "${TARGET}"; then
              HTTP_CODE="$(curl -sS -m 20 -o /dev/null -w "%{http_code}" "https://www.${ZONE}/" || true)"
              echo "https://www.${ZONE}/ -> HTTP ${HTTP_CODE}"
              if [ "$HTTP_CODE" = "200" ]; then
                curl -sS -m 20 "https://www.${ZONE}/" | grep -o "Gareth Mauck" | head -1 || true
                exit 0
              fi
            fi
            sleep 20
          done

          echo "DNS update submitted; propagation or SSL may still be in progress."
