name: Update DNS to Cloudflare Pages

on:
  workflow_dispatch:

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Point www CNAME to Cloudflare Pages
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          TARGET: meridian-compliance-website.pages.dev
          ZONE: meridianconsulting.co.za
        run: |
          set -euo pipefail
          CPANEL="https://${FTP_SERVER}:2083"
          AUTH=(-u "${FTP_USERNAME}:${FTP_PASSWORD}")

          api2() {
            local func="$1"
            shift
            local url="${CPANEL}/json-api/cpanel"
            local body
            body="$(mktemp)"
            local code
            code="$(curl -sS -m 30 -k "${AUTH[@]}" \
              -G "$url" \
              --data-urlencode "cpanel_jsonapi_user=${FTP_USERNAME}" \
              --data-urlencode "cpanel_jsonapi_apiversion=2" \
              --data-urlencode "cpanel_jsonapi_module=ZoneEdit" \
              --data-urlencode "cpanel_jsonapi_func=${func}" \
              "$@" \
              -o "$body" -w "%{http_code}")"
            echo "ZoneEdit.${func} HTTP ${code}"
            if ! jq -e . "$body" >/dev/null 2>&1; then
              echo "Non-JSON response:"
              head -c 500 "$body"
              exit 1
            fi
            jq '{cpanelresult: {event: .cpanelresult.event, error: .cpanelresult.error, data: (.cpanelresult.data // [])}}' "$body" | head -c 2000
            cp "$body" /tmp/zoneedit_last.json
          }

          echo "=== Fetch zone records ==="
          api2 fetchzone_records --data-urlencode "domain=${ZONE}"

          LINE="$(jq -r '
            .cpanelresult.data[]
            | select(.type == "CNAME")
            | select(.name == "www." + $zone or .name == "www" or (.name | test("^www\\.")))
            | .line
          ' --arg zone "${ZONE}." /tmp/zoneedit_last.json | head -1)"

          if [ -z "$LINE" ] || [ "$LINE" = "null" ]; then
            echo "Could not find www CNAME line. CNAME records:"
            jq '[.cpanelresult.data[] | select(.type == "CNAME")]' /tmp/zoneedit_last.json
            exit 1
          fi

          echo "Updating line ${LINE}: www CNAME -> ${TARGET}"
          api2 edit_zone_record \
            --data-urlencode "domain=${ZONE}" \
            --data-urlencode "line=${LINE}" \
            --data-urlencode "type=CNAME" \
            --data-urlencode "address=${TARGET}."

          EVENT="$(jq -r '.cpanelresult.event.result // .cpanelresult.event // empty' /tmp/zoneedit_last.json)"
          if [ "$EVENT" != "1" ] && [ "$EVENT" != "true" ]; then
            jq '.' /tmp/zoneedit_last.json
            exit 1
          fi

          echo "=== Verify DNS and site ==="
          for i in 1 2 3 4 5 6; do
            CNAME="$(dig +short "www.${ZONE}" CNAME | tr -d '\n')"
            echo "Attempt ${i}: www CNAME = ${CNAME:-<empty>}"
            if echo "$CNAME" | grep -qi "${TARGET}"; then
              HTTP_CODE="$(curl -sS -m 20 -o /dev/null -w "%{http_code}" "https://www.${ZONE}/" || true)"
              echo "https://www.${ZONE}/ -> HTTP ${HTTP_CODE}"
              if [ "$HTTP_CODE" = "200" ]; then
                curl -sS -m 20 "https://www.${ZONE}/" | grep -o "Gareth Mauck" | head -1 || true
                exit 0
              fi
            fi
            sleep 20
          done

          echo "DNS update submitted; propagation or SSL may still be in progress."
