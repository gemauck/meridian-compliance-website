name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment

      - name: Notify search engines of sitemap
        if: success()
        run: |
          SITEMAP="https://www.meridianconsulting.co.za/sitemap.xml"
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$SITEMAP', safe=''))")
          curl -sS "https://www.bing.com/ping?sitemap=${ENCODED}" || true
          curl -sS "https://webmaster.yandex.com/ping?sitemap=${ENCODED}" || true
