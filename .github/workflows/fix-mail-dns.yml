name: Fix mail DNS

on:
  workflow_dispatch:

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Try Netlify CLI DNS access
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npx --yes netlify-cli@latest sites:list --json | jq '[.[] | {name, id, custom_domain}]'
          npx --yes netlify-cli@latest dns:list meridianconsulting.co.za 2>&1 || true
