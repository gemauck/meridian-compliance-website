name: Fix mail DNS

on:
  workflow_dispatch:

jobs:
  fix-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Test webmail endpoints
        run: |
          for url in \
            "https://webmail.meridianconsulting.co.za" \
            "https://mail.meridianconsulting.co.za" \
            "https://meridianconsulting.co.za:2096" \
            "https://cp75.domains.co.za:2096" \
            "https://webmail.domains.co.za"; do
            echo "=== $url ==="
            curl -sS -m 20 -k -o /tmp/body.html -w "HTTP %{http_code}\n" "$url" || echo "FAILED"
            head -5 /tmp/body.html 2>/dev/null || true
            echo
          done
