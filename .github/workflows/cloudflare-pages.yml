name: Deploy to Cloudflare Pages

# Primary deploys run via Cloudflare's GitHub integration on push.
# This workflow is a manual fallback once CLOUDFLARE_API_TOKEN is set.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "3.114.15"
          command: pages deploy . --project-name=meridian-compliance-website --branch=main

      - name: Notify search engines of sitemap
        if: success()
        run: |
          SITEMAP="https://www.meridianconsulting.co.za/sitemap.xml"
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$SITEMAP', safe=''))")
          curl -sS "https://www.bing.com/ping?sitemap=${ENCODED}" || true
          curl -sS "https://webmaster.yandex.com/ping?sitemap=${ENCODED}" || true
