name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Get Cloudflare access token
        id: cf-token
        env:
          CLOUDFLARE_REFRESH_TOKEN: ${{ secrets.CLOUDFLARE_REFRESH_TOKEN }}
        run: |
          RESPONSE=$(curl -fsS -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "grant_type=refresh_token&refresh_token=${CLOUDFLARE_REFRESH_TOKEN}&client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
          TOKEN=$(python3 -c "import json, os; print(json.loads(os.environ['RESPONSE'])['access_token'])" RESPONSE="$RESPONSE")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.cf-token.outputs.token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ steps.cf-token.outputs.token }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "3.114.15"
          command: pages deploy . --project-name=meridian-compliance-website --branch=main --commit-dirty=true

      - name: Notify search engines of sitemap
        if: success()
        run: |
          SITEMAP="https://www.meridianconsulting.co.za/sitemap.xml"
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$SITEMAP', safe=''))")
          curl -sS "https://www.bing.com/ping?sitemap=${ENCODED}" || true
          curl -sS "https://webmaster.yandex.com/ping?sitemap=${ENCODED}" || true
