name: Migrate DNS to Cloudflare

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Add zone, Pages domains, and DNS records
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_REFRESH_TOKEN: ${{ secrets.CLOUDFLARE_REFRESH_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          ZONE: meridianconsulting.co.za
          PROJECT: meridian-compliance-website
          PAGES_TARGET: meridian-compliance-website.pages.dev
        run: |
          set -euo pipefail
          API="https://api.cloudflare.com/client/v4"

          echo "=== Get OAuth access token (broader permissions) ==="
          RESPONSE="$(curl -fsS -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "grant_type=refresh_token&refresh_token=${CLOUDFLARE_REFRESH_TOKEN}&client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")"
          OAUTH_TOKEN="$(python3 -c "import json, os; print(json.loads(os.environ['RESPONSE'])['access_token'])" RESPONSE="$RESPONSE")"
          echo "OAuth token acquired."

          auth_with() {
            AUTH=(-H "Authorization: Bearer $1" -H "Content-Type: application/json")
          }

          try_zone_ops() {
            local token="$1"
            auth_with "$token"

            echo "=== Look up or create Cloudflare zone ==="
            ZONE_BODY="$(mktemp)"
            curl -sS "${AUTH[@]}" "${API}/zones?name=${ZONE}" -o "$ZONE_BODY"
            ZONE_ID="$(jq -r '.result[0].id // empty' "$ZONE_BODY")"

            if [ -z "$ZONE_ID" ]; then
              ADD_ZONE="$(mktemp)"
              CODE="$(curl -sS -o "$ADD_ZONE" -w "%{http_code}" -X POST "${AUTH[@]}" \
                "${API}/zones" \
                -d "{\"account\":{\"id\":\"${CLOUDFLARE_ACCOUNT_ID}\"},\"name\":\"${ZONE}\",\"jump_start\":true}")"
              echo "Create zone HTTP ${CODE}"
              jq '{success, errors, messages}' "$ADD_ZONE"
              ZONE_ID="$(jq -r '.result.id // empty' "$ADD_ZONE")"
            fi

            [ -n "$ZONE_ID" ]
          }

          TOKEN="$OAUTH_TOKEN"
          if ! try_zone_ops "$TOKEN"; then
            echo "OAuth token could not create zone; trying API token."
            TOKEN="$CLOUDFLARE_API_TOKEN"
            try_zone_ops "$TOKEN" || {
              echo "Could not create or find zone with either token."
              exit 1
            }
          fi

          auth_with "$TOKEN"
          echo "Zone ID: ${ZONE_ID}"
          curl -sS "${AUTH[@]}" "${API}/zones/${ZONE_ID}" | jq '{
            name: .result.name,
            status: .result.status,
            nameservers: .result.name_servers
          }'

          echo "=== Add custom domains to Cloudflare Pages ==="
          for DOMAIN in "${ZONE}" "www.${ZONE}"; do
            ADD_BODY="$(mktemp)"
            CODE="$(curl -sS -o "$ADD_BODY" -w "%{http_code}" -X POST \
              "${AUTH[@]}" \
              "${API}/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT}/domains" \
              -d "{\"name\":\"${DOMAIN}\"}")"
            echo "Pages domain ${DOMAIN}: HTTP ${CODE}"
            jq '{success, errors, messages, result}' "$ADD_BODY" 2>/dev/null || cat "$ADD_BODY"
          done

          echo "=== Ensure www CNAME points at Pages ==="
          RECORDS="$(mktemp)"
          curl -sS "${AUTH[@]}" "${API}/zones/${ZONE_ID}/dns_records?type=CNAME&name=www.${ZONE}" -o "$RECORDS"
          WWW_ID="$(jq -r '.result[0].id // empty' "$RECORDS")"
          WWW_PAYLOAD="$(jq -n --arg name "www.${ZONE}" --arg content "${PAGES_TARGET}" \
            '{type:"CNAME", name:$name, content:$content, proxied:true, ttl:1}')"

          if [ -n "$WWW_ID" ]; then
            curl -sS -X PUT "${AUTH[@]}" "${API}/zones/${ZONE_ID}/dns_records/${WWW_ID}" \
              -d "$WWW_PAYLOAD" | jq '{success, errors}'
          else
            curl -sS -X POST "${AUTH[@]}" "${API}/zones/${ZONE_ID}/dns_records" \
              -d "$WWW_PAYLOAD" | jq '{success, errors}'
          fi

          echo "=== Apex to www redirect rule ==="
          ENTRY="$(mktemp)"
          curl -sS "${AUTH[@]}" \
            "${API}/zones/${ZONE_ID}/rulesets/phases/http_request_dynamic_redirect/entrypoint" \
            -o "$ENTRY" || true
          RULESET_ID="$(jq -r '.result.id // empty' "$ENTRY")"

          RULES_PAYLOAD="$(jq -n --arg zone "$ZONE" '{
            rules: [{
              expression: "(http.host eq \"" + $zone + "\")",
              description: "Redirect apex to www",
              action: "redirect",
              action_parameters: {
                from_value: {
                  status_code: 301,
                  target_url: {
                    expression: "concat(\"https://www." + $zone + "\", http.request.uri.path)"
                  },
                  preserve_query_string: true
                }
              }
            }]
          }')"

          if [ -n "$RULESET_ID" ]; then
            curl -sS -X PUT "${AUTH[@]}" \
              "${API}/zones/${ZONE_ID}/rulesets/${RULESET_ID}" \
              -d "$(jq -n --argjson rules "$RULES_PAYLOAD" '{rules: $rules.rules}')" \
              | jq '{success, errors}'
          else
            curl -sS -X POST "${AUTH[@]}" "${API}/zones/${ZONE_ID}/rulesets" \
              -d "$(jq -n --argjson rules "$RULES_PAYLOAD" \
                '{name:"Apex to www", kind:"zone", phase:"http_request_dynamic_redirect", rules:$rules.rules}')" \
              | jq '{success, errors}'
          fi

          echo "=== Update nameservers at registrar via cPanel ==="
          CPANEL="https://${FTP_SERVER}:2083"
          CPANEL_AUTH=(-u "${FTP_USERNAME}:${FTP_PASSWORD}")
          NS_BODY="$(mktemp)"
          curl -sS "${AUTH[@]}" "${API}/zones/${ZONE_ID}" -o "$NS_BODY"
          NS1="$(jq -r '.result.name_servers[0] // empty' "$NS_BODY")"
          NS2="$(jq -r '.result.name_servers[1] // empty' "$NS_BODY")"

          if [ -n "$NS1" ] && [ -n "$NS2" ]; then
            echo "Cloudflare nameservers: ${NS1}, ${NS2}"
            for FUNC in set_nameservers save_nameservers; do
              OUT="$(mktemp)"
              CODE="$(curl -sS -m 30 -k "${CPANEL_AUTH[@]}" \
                -G "${CPANEL}/json-api/cpanel" \
                --data-urlencode "cpanel_jsonapi_apiversion=2" \
                --data-urlencode "cpanel_jsonapi_module=Nameserver" \
                --data-urlencode "cpanel_jsonapi_func=${FUNC}" \
                --data-urlencode "domain=${ZONE}" \
                --data-urlencode "ns1=${NS1}" \
                --data-urlencode "ns2=${NS2}" \
                -o "$OUT" -w "%{http_code}" || echo "000")"
              echo "Nameserver.${FUNC} HTTP ${CODE}"
              jq '.' "$OUT" 2>/dev/null || head -c 300 "$OUT"
            done
          fi

          echo ""
          echo "=== Nameservers for ${ZONE} ==="
          jq -r '.result.name_servers[]' "$NS_BODY" | while read -r NS; do
            echo "  - ${NS}"
          done

          echo ""
          echo "=== Verify apex redirect ==="
          for i in 1 2 3 4 5 6 8 10; do
            APEX_URL="$(curl -sS -m 15 -o /dev/null -w "%{url_effective}" -L "https://${ZONE}/" || true)"
            echo "Attempt ${i}: ${APEX_URL}"
            if echo "$APEX_URL" | grep -qi "www.${ZONE}"; then
              echo "Apex redirect verified."
              exit 0
            fi
            sleep 20
          done

          echo "Zone configured in Cloudflare. Nameserver propagation may take up to 24 hours."
