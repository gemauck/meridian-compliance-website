name: Update domains.co.za nameservers

on:
  workflow_dispatch:

jobs:
  domains-ns:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          pip install playwright==1.49.1
          playwright install chromium --with-deps

      - name: Change nameservers in domains.co.za Client Portal
        env:
          LOGIN_EMAIL: gemauck@gmail.com
          LOGIN_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          ALT_USERNAME: ${{ secrets.FTP_USERNAME }}
          ALT_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          ZONE: meridianconsulting.co.za
          NS1: alaric.ns.cloudflare.com
          NS2: rayne.ns.cloudflare.com
        run: |
          python3 - <<'PY'
          import os, re, sys, time
          from playwright.sync_api import sync_playwright

          zone = os.environ["ZONE"]
          ns1 = os.environ["NS1"]
          ns2 = os.environ["NS2"]
          attempts = [
              (os.environ.get("LOGIN_EMAIL", ""), os.environ.get("LOGIN_PASSWORD", "")),
              (os.environ.get("ALT_USERNAME", ""), os.environ.get("ALT_PASSWORD", "")),
              ("info@meridianconsulting.co.za", os.environ.get("LOGIN_PASSWORD", "")),
          ]

          def logged_in(page):
              body = page.inner_text("body").lower()
              if zone in page.inner_text("body"):
                  return True
              if "manage services" in body or "my account" in body or "log out" in body or "logout" in body:
                  return True
              return page.locator("#inputUser").count() == 0 and "sign in" not in body

          def try_login(page, user, password):
              if not user or not password:
                  return False
              print(f"Trying login as: {user}")
              page.goto("https://www.domains.co.za/login", wait_until="domcontentloaded", timeout=120000)
              time.sleep(6)
              if logged_in(page):
                  print("Already logged in")
                  return True
              if page.locator("#inputUser").count() == 0:
                  print("No login form:", page.url)
                  print(page.inner_text("body")[:1200])
                  return False
              page.locator("#inputUser").fill(user)
              page.locator("#inputPass").fill(password)
              sign_in = page.get_by_role("button", name=re.compile(r"sign in", re.I))
              if sign_in.count() == 0:
                  sign_in = page.locator("button, a, input").filter(has_text=re.compile(r"^sign in$", re.I))
              sign_in.first.click()
              time.sleep(8)
              body = page.inner_text("body").lower()
              if page.locator("#otpPin, #otpCellPin, #authCode").count() and page.locator("#otpPin, #otpCellPin, #authCode").first.is_visible():
                  print("2FA/OTP required for", user)
                  return False
              if not logged_in(page):
                  print("Login failed for", user)
                  print(page.inner_text("body")[:1200])
                  return False
              print("Login OK:", page.url)
              return True

          def change_nameservers(page):
              for label in [r"manage services", r"domains"]:
                  nav = page.get_by_text(re.compile(label, re.I))
                  if nav.count():
                      nav.first.click()
                      time.sleep(2)
              targets = [
                  "https://www.domains.co.za/account/domains",
                  "https://www.domains.co.za/clientarea.php?action=domains",
                  "https://www.domains.co.za/account",
              ]
              for url in targets:
                  print("Opening", url)
                  try:
                      page.goto(url, wait_until="domcontentloaded", timeout=120000)
                  except Exception as e:
                      print("Navigation error:", e)
                      continue
                  time.sleep(5)
                  if page.get_by_text(re.compile(re.escape(zone), re.I)).count():
                      break

              domain = page.get_by_role("link", name=re.compile(re.escape(zone), re.I))
              if domain.count() == 0:
                  domain = page.get_by_text(re.compile(re.escape(zone), re.I))
              if domain.count() == 0:
                  manage = page.get_by_role("button", name=re.compile(r"manage", re.I))
                  if manage.count():
                      manage.first.click()
                      time.sleep(3)
              if domain.count() == 0:
                  domain = page.get_by_text(re.compile(re.escape(zone), re.I))
              if domain.count() == 0:
                  print("Domain not found in portal")
                  print(page.inner_text("body")[:2500])
                  return False
              domain.first.click()
              time.sleep(4)

              for pattern in [r"nameserver", r"name server", r"manage nameservers", r"change nameservers"]:
                  link = page.get_by_role("link", name=re.compile(pattern, re.I))
                  if link.count() == 0:
                      link = page.get_by_text(re.compile(pattern, re.I))
                  if link.count():
                      link.first.click()
                      time.sleep(3)
                      break

              custom = page.get_by_text(re.compile(r"custom|different|use custom", re.I))
              if custom.count():
                  custom.first.click()
                  time.sleep(1)

              inputs = page.locator("input[type='text'], input:not([type])").all()
              ns_fields = []
              for inp in inputs:
                  name = (inp.get_attribute("name") or "").lower()
                  id_ = (inp.get_attribute("id") or "").lower()
                  if "ns" in name or "nameserver" in name or "ns" in id_:
                      ns_fields.append(inp)
              if len(ns_fields) < 2:
                  ns_fields = [i for i in inputs if i.is_visible()][:4]

              if len(ns_fields) < 2:
                  print("Could not find nameserver fields")
                  print(page.inner_text("body")[:2500])
                  return False

              ns_fields[0].fill(ns1)
              ns_fields[1].fill(ns2)

              for label in [r"save changes", r"save", r"update", r"change nameservers", r"submit"]:
                  btn = page.get_by_role("button", name=re.compile(label, re.I))
                  if btn.count() == 0:
                      btn = page.locator("input[type='submit']").filter(has_text=re.compile(label, re.I))
                  if btn.count():
                      btn.first.click()
                      time.sleep(4)
                      break

              print("Done. URL:", page.url)
              print(page.inner_text("body")[:2000])
              return True

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.set_default_timeout(90000)
              ok = False
              for user, password in attempts:
                  if try_login(page, user, password):
                      if change_nameservers(page):
                          ok = True
                          break
                      print("Logged in but nameserver change failed; trying next credential...")
                  time.sleep(2)
              browser.close()
              if not ok:
                  sys.exit(1)
          PY

          echo "=== Verify NS propagation (may take time) ==="
          dig +short NS "${ZONE}" || true
