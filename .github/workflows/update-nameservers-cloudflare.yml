name: Update nameservers to Cloudflare

on:
  workflow_dispatch:

jobs:
  nameservers:
    runs-on: ubuntu-latest
    steps:
      - name: Point registrar nameservers at Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          ZONE: meridianconsulting.co.za
        run: |
          set -euo pipefail
          API="https://api.cloudflare.com/client/v4"
          AUTH=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json")
          CPANEL="https://${FTP_SERVER}:2083"
          CPANEL_AUTH=(-u "${FTP_USERNAME}:${FTP_PASSWORD}")

          ZONE_BODY="$(mktemp)"
          curl -sS "${AUTH[@]}" "${API}/zones?name=${ZONE}" -o "$ZONE_BODY"
          NS1="$(jq -r '.result[0].name_servers[0] // empty' "$ZONE_BODY")"
          NS2="$(jq -r '.result[0].name_servers[1] // empty' "$ZONE_BODY")"
          ZONE_ID="$(jq -r '.result[0].id // empty' "$ZONE_BODY")"

          if [ -z "$NS1" ] || [ -z "$NS2" ]; then
            echo "Cloudflare zone not found for ${ZONE}"
            jq '.' "$ZONE_BODY"
            exit 1
          fi

          echo "Cloudflare nameservers:"
          echo "  ${NS1}"
          echo "  ${NS2}"

          echo "=== Try cPanel registrar nameserver APIs ==="
          for MODULE_FUNC in \
            "Nameserver:set_nameservers" \
            "Nameserver:save_nameservers" \
            "Domain:SetNameservers"; do
            MODULE="${MODULE_FUNC%%:*}"
            FUNC="${MODULE_FUNC#*:}"
            OUT="$(mktemp)"
            CODE="$(curl -sS -m 30 -k "${CPANEL_AUTH[@]}" \
              -G "${CPANEL}/json-api/cpanel" \
              --data-urlencode "cpanel_jsonapi_apiversion=2" \
              --data-urlencode "cpanel_jsonapi_module=${MODULE}" \
              --data-urlencode "cpanel_jsonapi_func=${FUNC}" \
              --data-urlencode "domain=${ZONE}" \
              --data-urlencode "ns1=${NS1}" \
              --data-urlencode "ns2=${NS2}" \
              -o "$OUT" -w "%{http_code}" || echo "000")"
            echo "${MODULE}.${FUNC} HTTP ${CODE}"
            jq '.' "$OUT" 2>/dev/null || head -c 400 "$OUT"
            echo ""
          done

          echo "=== Try WHM set nameservers ==="
          WHM_OUT="$(mktemp)"
          WHM_CODE="$(curl -sS -m 30 -k "${CPANEL_AUTH[@]}" \
            -G "${CPANEL}:2087/json-api/setdns" \
            --data-urlencode "domain=${ZONE}" \
            --data-urlencode "ns1=${NS1}" \
            --data-urlencode "ns2=${NS2}" \
            -o "$WHM_OUT" -w "%{http_code}" || echo "000")"
          echo "WHM setdns HTTP ${WHM_CODE}"
          jq '.' "$WHM_OUT" 2>/dev/null || head -c 400 "$WHM_OUT"

          echo ""
          echo "If APIs above were rejected, update nameservers manually at domains.co.za:"
          echo "  ${NS1}"
          echo "  ${NS2}"

          echo ""
          echo "=== Configure Pages custom domains ==="
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          PROJECT="meridian-compliance-website"
          for DOMAIN in "${ZONE}" "www.${ZONE}"; do
            ADD_BODY="$(mktemp)"
            CODE="$(curl -sS -o "$ADD_BODY" -w "%{http_code}" -X POST \
              "${AUTH[@]}" \
              "${API}/accounts/${ACCOUNT_ID}/pages/projects/${PROJECT}/domains" \
              -d "{\"name\":\"${DOMAIN}\"}")"
            echo "Pages domain ${DOMAIN}: HTTP ${CODE}"
            jq '{success, errors, messages}' "$ADD_BODY" 2>/dev/null || cat "$ADD_BODY"
          done

          echo ""
          echo "=== Ensure www CNAME in Cloudflare DNS ==="
          RECORDS="$(mktemp)"
          curl -sS "${AUTH[@]}" "${API}/zones/${ZONE_ID}/dns_records?type=CNAME&name=www.${ZONE}" -o "$RECORDS"
          WWW_ID="$(jq -r '.result[0].id // empty' "$RECORDS")"
          PAYLOAD="$(jq -n --arg name "www.${ZONE}" --arg content "meridian-compliance-website.pages.dev" \
            '{type:"CNAME", name:$name, content:$content, proxied:true, ttl:1}')"
          if [ -n "$WWW_ID" ]; then
            curl -sS -X PUT "${AUTH[@]}" "${API}/zones/${ZONE_ID}/dns_records/${WWW_ID}" -d "$PAYLOAD" | jq '{success, errors}'
          else
            curl -sS -X POST "${AUTH[@]}" "${API}/zones/${ZONE_ID}/dns_records" -d "$PAYLOAD" | jq '{success, errors}'
          fi
